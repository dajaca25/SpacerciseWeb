<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spacercise — Arcade Action &amp; Motion Tracking Fitness</title>
<meta name="description" content="With just your webcam and a wide variety of exercises, blast your way through endless challenges in this hybrid between exercise gaming and arcade space-shooting.">
<link rel="icon" href="images/dev-logo.png">
<link rel="stylesheet" href="css/styles.css?v=2">
<link rel="stylesheet" href="css/site.css?v=3">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head>
<body>
<div class="page">

  <!-- HERO: auto-sliding screenshot carousel with logo overlay -->
  <div class="hero">
    <div class="hero-track" id="track">
      <div class="slide"></div>
    </div>

    <!-- bottom fade into the page ground -->
    <div class="hero-fade"></div>

    <!-- game logo overlapping the carousel -->
    <div class="hero-logo-wrap">
      <div class="hero-logo">
        <div class="slot-label">Game logo — upload images/logo.png</div>
        <img src="images/logo.png" alt="Spacercise logo" onload="this.previousElementSibling.remove()" onerror="this.remove()">
      </div>
      <p class="hero-tagline">Arcade action and motion tracking fitness excellence</p>
    </div>

    <!-- slide dots (built by main.js from the slides folder) -->
    <div class="hero-dots" id="dots"></div>

  </div>

  <!-- BODY -->
  <main>
    <div class="sections">
      <section>
        <div class="title-rule"></div>
        <p class="lede">With just your webcam and a wide variety of exercises, blast your way through endless challenges in this hybrid between exercise gaming and arcade space-shooting.</p>
        <div class="cta-row">
          <!--
          <a href="https://store.steampowered.com/app/4974080/Spacercise" target="_blank" rel="noopener" class="btn btn-primary"><i class="ph ph-steam-logo"></i>View on Steam</a>
          <a href="https://store.steampowered.com/app/4974080/Spacercise" target="_blank" rel="noopener" class="btn btn-secondary"><i class="ph ph-plus-circle"></i>Wishlist on Steam</a>
          -->
          <button type="button" class="btn btn-primary" disabled><i class="ph ph-steam-logo"></i>Steam link coming soon!</button>
        </div>
      </section>
    </div>
  </main>

  <!-- fixed developer logo, bottom-left -->
  <div class="dev-logo">
    <div class="slot">
      <div class="slot-label">Dev logo</div>
      <img src="images/dev-logo.png" alt="Developer logo" onload="this.previousElementSibling.remove()" onerror="this.remove()">
    </div>
  </div>

</div>
<script src="js/main.js?v=3"></script>
</body>
</html>
